<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1a1714" />
<title>claude-term</title>
<link rel="icon" href="data:," />
<link rel="stylesheet" href="/style.css" />
</head><body>
  <header id="bar">
    <select id="sessions" title="sessions"></select>
    <button id="refresh" title="refresh">⟳</button>
    <button id="new" title="new session">＋</button>
    <button id="del" title="delete session">🗑</button>
  </header>

  <main id="transcript"><div class="empty">Pick or start a session.</div></main>

  <div id="status">
    <span id="st-model">—</span>
    <span id="st-ctx"></span>
    <span id="st-cost"></span>
    <span id="st-run" class="live"></span>
  </div>

  <div id="prompts" class="hidden"></div>

  <footer id="composer">
    <button id="promptsBtn" title="prompts">⌨</button>
    <textarea id="input" rows="1" placeholder="Message Claude…" enterkeyhint="send"></textarea>
    <button id="send" title="send" disabled>↑</button>
    <button id="stop" class="hidden" title="interrupt">■</button>
  </footer>

  <script src="/app.js"></script>
</body></html>
